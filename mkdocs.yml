site_name: SCE Futures
site_description: Introduction to superconductor electronics — from Josephson junctions to AI accelerator architectures. By Adiabatic Machines.
site_author: Adiabatic Machines
copyright: "&copy; 2026 Adiabatic Machines"
site_url: https://adiabatic-machines.github.io/sce-futures/
repo_url: https://github.com/Adiabatic-Machines/sce-futures

theme:
  name: material
  logo: assets/am-mark.png
  favicon: assets/am-mark.png
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.footer
    - navigation.top
    - navigation.tracking
    - navigation.prune
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search
  - mkdocs-jupyter:
      include_source: true
      execute: false
      ignore_h1_titles: true

nav:
  - Home: index.md
  - Lectures:
    - "0. Why Superconducting Electronics?": notebooks/00_executive_overview.ipynb
    - "Part I: Foundations":
      - "1. Introduction to Superconductivity": notebooks/01_introduction_superconductivity.ipynb
      - "2. Materials & Properties": notebooks/02_materials_properties.ipynb
      - "3. Josephson Junctions": notebooks/03_josephson_junctions.ipynb
    - "Part II: Devices & Circuits":
      - "4. Analog Devices": notebooks/04_analog_devices.ipynb
      - "5. Digital Logic": notebooks/05_digital_logic.ipynb
      - "6. Memory & Storage": notebooks/06_memory_storage.ipynb
      - "7. Circuit Design & Integration": notebooks/07_circuit_design_integration.ipynb
      - "8. Fabrication": notebooks/08_fabrication.ipynb
    - "Part III: Systems Integration":
      - "9. Packaging & I/O": notebooks/09_packaging_io.ipynb
      - "10. Cryogenic Systems": notebooks/10_cryogenic_systems.ipynb
      - "11. Testing": notebooks/11_testing.ipynb
    - "Part IV: Applications":
      - "12. Classical Applications": notebooks/12_classical_applications.ipynb
      - "13. AI Workloads & Dataflow": notebooks/13_ai_workloads_dataflow.ipynb
      - "14. SCE Accelerator Architecture": notebooks/14_sce_accelerator_architecture.ipynb

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
  - javascripts/extra.js

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.inlinehilite
  - admonition
  - pymdownx.details
  - pymdownx.arithmatex:
      generic: true
