site_name: SCE Futures
site_description: Superconducting electronics course materials
repo_url: https://github.com/AlexWynn-AM/sce-futures

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy

plugins:
  - search
  - mkdocs-jupyter:
      include_source: true
      execute: false
      ignore_h1_titles: true

nav:
  - Home: index.md
  - Lectures:
    - "1. Introduction to Superconductivity": notebooks/01_introduction_superconductivity.ipynb
    - "2. Materials & Properties": notebooks/02_materials_properties.ipynb
    - "3. Josephson Junctions": notebooks/03_josephson_junctions.ipynb
    - "4. Fabrication": notebooks/04_fabrication.ipynb
    - "5. Analog Devices": notebooks/05_analog_devices.ipynb
    - "6. Digital Logic": notebooks/06_digital_logic.ipynb
    - "7. Packaging & I/O": notebooks/07_packaging_io.ipynb
    - "8. Cryogenic Systems": notebooks/08_cryogenic_systems.ipynb
    - "9. Testing": notebooks/09_testing.ipynb
    - "10. Applications": notebooks/10_applications.ipynb
    - "11. Transformer Architectures": notebooks/11_transformer_architectures.ipynb
    - "12. Systolic Arrays & Hardware": notebooks/12_systolic_arrays_hardware.ipynb

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
  - javascripts/extra.js

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.inlinehilite
  - admonition
  - pymdownx.details
  - pymdownx.arithmatex:
      generic: true
